<form
  id="login-form"
  hx-post="{% url 'login_submit' %}"
  hx-target="#login-panel"
  hx-swap="innerHTML"
  hx-disabled-elt="#signInBtn"
  autocomplete="on"
  novalidate
>
  {% csrf_token %}

  {% if error %}
    <div class="form-error" role="alert" aria-live="assertive">{{ error }}</div>
  {% endif %}

  <div class="field">
    <label for="loginEmail">Email</label>
    <input
      id="loginEmail"
      name="login"
      type="email"
      inputmode="email"
      autocomplete="username"
      autocapitalize="off"
      spellcheck="false"
      required
      placeholder="Enter email"
      value="{{ login_value|default:'' }}"
    >
  </div>

  <div class="field">
    <label for="loginPassword">Password</label>
    <input
      id="loginPassword"
      name="password"
      type="password"
      autocomplete="current-password"
      required
      placeholder="Enter password"
    >
  </div>

  <button id="signInBtn" class="btn btn-primary btn-full" type="submit">Sign in</button>
</form>
