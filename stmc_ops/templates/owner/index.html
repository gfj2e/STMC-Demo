<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Dashboard — STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'owner.css' %}">
</head>
<body class="view-mode-table">

<!-- Nav -->
<nav class="app-nav">
  <div class="app-nav-left">
    <button class="app-nav-link active" data-tab="dashboard" type="button">Active Contracts</button>
    <button class="app-nav-link" data-tab="projects-closed" type="button">Closed Contracts</button>
    <button class="app-nav-link" data-tab="rates" type="button">Rates</button>
  </div>
  <div class="app-nav-right">
    <!-- Bell: polls the unread count every 30s. The inner dropdown is
         lazy-loaded into #owner-bell-dropdown when the user clicks. -->
    <div class="bell-container">
      <div id="owner-bell-wrap"
           hx-get="{% url 'owner_notifications_bell' %}"
           hx-trigger="load, every 30s, owner-bell-refresh from:body"
           hx-swap="innerHTML"></div>
      <div id="owner-bell-dropdown" class="bell-dropdown" aria-live="polite"></div>
    </div>
    <span id="hN" style="font-size:11px;color:#4b5563"></span>
    <span id="hA" style="width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:#111827;color:#fff;font-size:10px;font-weight:700"></span>
    <button class="logout-link" type="button">Logout</button>
  </div>
</nav>

<!-- Toast container for live QB invoice notifications -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <div class="header-sub">Summertown Metals</div>
  <div class="header-title">Owner Dashboard</div>
  <div class="header-total" id="owner-total">{{ owner_total }}</div>
  <div class="header-subtotal-note">Contract Value</div>
</div>

<!-- KPI strip -->
<div class="kpi-strip" id="owner-kpis">
  {% for kpi in kpis %}
    <div class="kpi-tile">
      <div class="{{ kpi.value_class }}">{{ kpi.value }}</div>
      <div class="kpi-lbl">{{ kpi.label }}</div>
    </div>
  {% endfor %}
</div>

<!-- Tab panels -->
<div class="container">

  <div id="job-search-wrap" class="job-search-wrap">
    <div class="job-search-controls">
      <label class="job-search-field">
        <span class="job-search-chip">Search</span>
        <input
          id="job-search-input"
          class="job-search-input"
          type="search"
          placeholder="customer, order #, branch"
          aria-label="Search jobs"
        >
      </label>
      <button id="job-search-btn" class="job-search-btn" type="button">Find Job</button>
    </div>
    <div class="job-filter-row" aria-label="Project filters">
      <select id="job-filter-branch" class="job-filter-select" aria-label="Filter by branch">
        <option value="">All branches</option>
      </select>
      <select id="job-filter-plan" class="job-filter-select" aria-label="Filter by plan">
        <option value="">All plans</option>
      </select>
      <select id="job-filter-phase" class="job-filter-select" aria-label="Filter by phase">
        <option value="">All phases</option>
      </select>
      <select id="job-filter-year" class="job-filter-select" aria-label="Filter by year">
        <option value="">All years</option>
      </select>
      <select id="job-filter-sort" class="job-filter-select" aria-label="Sort jobs">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
  </div>

  <div id="owner-view-toggle-home">
    <div class="job-view-toggle" role="group" aria-label="View mode">
      <button id="job-view-table" type="button" class="job-view-btn active" aria-pressed="true">Table</button>
      <button id="job-view-cards" type="button" class="job-view-btn" aria-pressed="false">Cards</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="tab-dashboard" class="tab-panel">
    <!-- QuickBooks connection status (rendered server-side; HTMX re-fetches only
         after connect / disconnect via qb-status-refresh). -->
    <div
      id="qb-status-wrap"
      hx-get="{% url 'qb_status' %}"
      hx-trigger="qb-status-refresh from:body"
      hx-swap="innerHTML"
    >
      {% include "owner/_qb_status.html" %}
    </div>
    <div
      id="tab-dashboard-panel"
      hx-get="{% url 'owner_dashboard_panel' %}"
      hx-trigger="load, owner-dashboard-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading dashboard...</div>
    </div>
  </div>

  <!-- Closed Projects -->
  <div id="tab-projects-closed" class="tab-panel" style="display:none">
    <div
      id="tab-projects-closed-panel"
      hx-get="{% url 'owner_closed_projects_panel' %}"
      hx-trigger="load, owner-projects-closed-refresh from:body, owner-projects-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading closed projects...</div>
    </div>
  </div>

    <!-- Rate Card -->
  <div id="tab-rates" class="tab-panel" style="display:none">
    <div
      id="tab-rates-panel"
      hx-get="{% url 'sales_rates_panel' %}"
      hx-trigger="load, sales-rates-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading rate card...</div>
    </div>
  </div>

</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'owner.js' %}?v=2"></script>
</body>
</html>
