<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Dashboard — STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'owner.css' %}">
</head>
<body>

<!-- Nav -->
<nav class="app-nav">
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1">
    <button class="app-nav-link active" data-tab="dashboard" type="button">Dashboard</button>
    <button class="app-nav-link" data-tab="projects" type="button">All Projects</button>
    <button class="app-nav-link" data-tab="payments" type="button">Payments</button>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;white-space:nowrap">
    <button class="logout-link" type="button">Logout</button>
    <span id="hN" style="font-size:11px;color:#4b5563"></span>
    <span id="hA" style="width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:#111827;color:#fff;font-size:10px;font-weight:700"></span>
  </div>
</nav>

<!-- Header -->
<div class="header">
  <div class="header-sub">Summertown Metals</div>
  <div class="header-title">Owner Dashboard</div>
  <div class="header-total" id="owner-total">{{ owner_total }}</div>
  <div class="header-subtotal-note">Contract Value</div>
</div>

<!-- KPI strip -->
<div class="kpi-strip" id="owner-kpis">
  {% for kpi in kpis %}
    <div class="kpi-tile">
      <div class="{{ kpi.value_class }}">{{ kpi.value }}</div>
      <div class="kpi-lbl">{{ kpi.label }}</div>
    </div>
  {% endfor %}
</div>

<!-- Tab panels -->
<div class="container">

  <!-- Dashboard -->
  <div id="tab-dashboard" class="tab-panel">
    <div
      id="tab-dashboard-panel"
      hx-get="{% url 'owner_dashboard_panel' %}"
      hx-trigger="load, owner-dashboard-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading dashboard...</div>
    </div>
  </div>

  <!-- All Projects -->
  <div id="tab-projects" class="tab-panel" style="display:none">
    <div
      id="tab-projects-panel"
      hx-get="{% url 'owner_all_projects_panel' %}"
      hx-trigger="load, owner-projects-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading projects...</div>
    </div>
  </div>

  <!-- Payments -->
  <div id="tab-payments" class="tab-panel" style="display:none">
    <div
      id="tab-payments-panel"
      hx-get="{% url 'owner_payments_panel' %}"
      hx-trigger="load, owner-payments-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading payments...</div>
    </div>
  </div>

</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'owner.js' %}"></script>
</body>
</html>
