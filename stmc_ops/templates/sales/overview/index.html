<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Overview &mdash; STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'sales.css' %}?v=12">
</head>
<body>

<!-- Nav (shared with shell/turnkey wizard) -->
{% include "sales/_nav.html" %}

<!-- Header + KPI (auto-refreshes on sales-refresh event) -->
<div
  id="sales-header-wrap"
  hx-get="{% url 'sales_header_panel' %}"
  hx-trigger="sales-refresh from:body"
  hx-swap="innerHTML"
>
  {% include "sales/overview/_header.html" %}
</div>

<!-- Toast (search feedback) -->
<div class="toast" id="toast"></div>

<!-- Tab panels -->
<div class="container">

  <div id="job-search-wrap" class="job-search-wrap">
    <div class="job-search-controls">
      <label class="job-search-field">
        <span class="job-search-chip">Search</span>
        <input
          id="job-search-input"
          class="job-search-input"
          type="search"
          placeholder="customer, order #, branch"
          aria-label="Search jobs"
        >
      </label>
      <button id="job-search-btn" class="job-search-btn" type="button">Find Job</button>
    </div>
    <div class="job-filter-row" aria-label="Project filters">
      <select id="job-filter-branch" class="job-filter-select" aria-label="Filter by branch">
        <option value="">All branches</option>
      </select>
      <select id="job-filter-plan" class="job-filter-select" aria-label="Filter by plan">
        <option value="">All plans</option>
      </select>
      <select id="job-filter-phase" class="job-filter-select" aria-label="Filter by phase">
        <option value="">All phases</option>
      </select>
      <select id="job-filter-year" class="job-filter-select" aria-label="Filter by year">
        <option value="">All years</option>
      </select>
      <select id="job-filter-sort" class="job-filter-select" aria-label="Sort jobs">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
  </div>
  
  <div class="job-view-toggle" role="group" aria-label="View mode">
    <button id="job-view-table" type="button" class="job-view-btn" aria-pressed="true">Table</button>
    <button id="job-view-cards" type="button" class="job-view-btn active" aria-pressed="false">Cards</button>
  </div>
  <!-- Leads -->
  <div id="tab-leads" class="tab-panel" style="display:none">
    <div class="leads-intro">
      <div class="leads-intro-note">Early-stage customer contacts. Convert to a contract when ready.</div>
      <a href="{% url 'sales_new_lead' %}" class="sales-btn sales-btn-primary">
        + Add Lead
      </a>
    </div>
    <div
      id="tab-leads-panel"
      hx-get="{% url 'sales_leads_panel' %}"
      hx-trigger="load, sales-leads-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading leads...</div>
    </div>
  </div>

  <!-- In Progress -->
  <div id="tab-in-progress" class="tab-panel">
    <div
      id="tab-in-progress-panel"
      hx-get="{% url 'sales_in_progress_panel' %}"
      hx-trigger="load, sales-in-progress-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading in-progress contracts...</div>
    </div>
  </div>

  <!-- Closed -->
  <div id="tab-closed" class="tab-panel" style="display:none">
    <div
      id="tab-closed-panel"
      hx-get="{% url 'sales_closed_panel' %}"
      hx-trigger="load, sales-closed-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading closed contracts...</div>
    </div>
  </div>


</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'sales.js' %}?v=9"></script>
</body>
</html>
