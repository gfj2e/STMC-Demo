<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Overview &mdash; STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'sales.css' %}?v=3">
</head>
<body>

<!-- Nav (shared with shell/turnkey wizard) -->
{% include "sales/_nav.html" %}

<!-- Header + KPI (auto-refreshes on sales-refresh event) -->
<div
  id="sales-header-wrap"
  hx-get="{% url 'sales_header_panel' %}"
  hx-trigger="sales-refresh from:body"
  hx-swap="innerHTML"
>
  {% include "sales/overview/_header.html" %}
</div>

<!-- Tab panels -->
<div class="container">

  <!-- Leads -->
  <div id="tab-leads" class="tab-panel" style="display:none">
    <div class="leads-intro">
      <div class="leads-intro-note">Early-stage customer contacts. Convert to a contract when ready.</div>
      <a href="{% url 'sales_new_lead' %}" class="sales-btn sales-btn-primary">
        + Add Lead
      </a>
    </div>
    <div
      id="tab-leads-panel"
      hx-get="{% url 'sales_leads_panel' %}"
      hx-trigger="load, sales-leads-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading leads...</div>
    </div>
  </div>

  <!-- In Progress -->
  <div id="tab-in-progress" class="tab-panel">
    <div
      id="tab-in-progress-panel"
      hx-get="{% url 'sales_in_progress_panel' %}"
      hx-trigger="load, sales-in-progress-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading in-progress contracts...</div>
    </div>
  </div>

  <!-- Closed -->
  <div id="tab-closed" class="tab-panel" style="display:none">
    <div
      id="tab-closed-panel"
      hx-get="{% url 'sales_closed_panel' %}"
      hx-trigger="load, sales-closed-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading closed contracts...</div>
    </div>
  </div>

  <!-- Rate Card -->
  <div id="tab-rates" class="tab-panel" style="display:none">
    <div
      id="tab-rates-panel"
      hx-get="{% url 'sales_rates_panel' %}"
      hx-trigger="load, sales-rates-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading rate card...</div>
    </div>
  </div>

</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'sales.js' %}?v=3"></script>
</body>
</html>
