<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Overview — STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<style>
/* ── Nav (matches shell/turnkey wizard style) ── */
.logout-link{border:none;background:transparent;color:#fca5a5;font-size:11px;text-decoration:underline;cursor:pointer;padding:0}
.app-nav{position:sticky;top:0;z-index:119;display:flex;align-items:center;gap:6px;padding:8px 12px;background:#ffffff;border-bottom:1px solid #e5e7eb;overflow-x:auto}
.app-nav-link{text-decoration:none;font-size:12px;font-weight:600;color:#4b5563;padding:8px 12px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
.app-nav-link.active{color:#a31a1a;border-color:#fecaca;background:#fef2f2}

/* ── Tab bar ── */
.tab-bar{display:flex;background:var(--red);border-top:1px solid rgba(255,255,255,.18);overflow-x:auto}
.tab-btn{flex:1;min-width:90px;padding:12px 8px;background:none;border:none;color:rgba(255,255,255,.7);font-family:var(--font-ui);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s}
.tab-btn.active{color:#fff;border-bottom-color:#fff}

/* ── KPI strip ── */
.kpi-strip{display:flex;gap:12px;padding:16px;overflow-x:auto;background:var(--g50);border-bottom:1px solid var(--g200)}
.kpi-tile{flex:1;min-width:120px;background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:14px 16px;text-align:center}
.kpi-val{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--g900)}
.kpi-val.tone-success{color:var(--green)}
.kpi-val.tone-warning{color:var(--amber)}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--g500);margin-top:4px}

/* ── Project cards ── */
.proj-card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.proj-hdr{display:flex;flex-direction:column;padding:12px 16px;cursor:pointer;background:var(--g50);border-bottom:1px solid var(--g200)}
.proj-hdr:hover{background:var(--g100)}
.proj-hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.proj-name{font-size:15px;font-weight:600;color:var(--g900);margin:0}
.proj-sub{font-size:11px;color:var(--g500);margin-top:1px}
.proj-body{padding:0 16px 12px;display:none}
.proj-body.open{display:block}
.chevron{font-size:14px;color:var(--g400);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
/* ── Draw rows (icon style) ── */
.ph{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--g100);font-size:12px}
.ph:last-child{border-bottom:none}
.pd{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.pdg{background:var(--green-light);color:#065F46}
.pdb{background:#EFF6FF;color:#1D4ED8;border:2px solid #93C5FD}
.pdx{background:var(--g100);color:var(--g500)}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-brand{background:#FEE2E2;color:var(--red)}
.pill-success{background:var(--green-light);color:#065F46}
.pill-warning{background:var(--amber-light);color:var(--amber-dark)}
.pill-muted{background:var(--g200);color:var(--g600)}

/* ── Models list ── */
.stl{font-size:14px;font-weight:600;color:var(--g900);margin:0 0 4px;display:flex;align-items:center;gap:6px}
.stl-badge{font-size:10px;background:#FEE2E2;color:var(--red);padding:2px 8px;border-radius:5px;font-weight:600}

/* ── Rate card table ── */
.rate-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.rate-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--g500);padding:6px 8px;border-bottom:2px solid var(--g200);text-align:left}
.rate-table th.r{text-align:right}
.rate-table td{padding:7px 8px;border-bottom:1px solid var(--g100);font-size:12px;color:var(--g700)}
.rate-table td.r{text-align:right;font-family:var(--font-mono);font-weight:600;color:var(--g900)}
.rate-table td.u{text-align:right;color:var(--g500)}
.rate-group-hdr td{background:var(--g800);color:#fff;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px}
</style>
</head>
<body>

<!-- Nav (shared with shell/turnkey wizard) -->
{% include "sales/_nav.html" %}

<!-- Header -->
<div class="header">
  <div class="header-sub">Sales</div>
  <div class="header-title">My Projects</div>
  <div class="header-total" id="sales-total">—</div>
  <div class="header-subtotal-note">Total Contract Value</div>
</div>

<!-- KPI strip -->
<div class="kpi-strip" id="sales-kpis"></div>

<!-- Tab panels -->
<div class="container">

  <!-- My Projects -->
  <div id="tab-projects" class="tab-panel">
    <div id="projects-list"></div>
  </div>

  <!-- Models -->
  <div id="tab-models" class="tab-panel" style="display:none">
    <div id="models-list"></div>
  </div>

  <!-- Rate Card -->
  <div id="tab-rates" class="tab-panel" style="display:none">
    <div class="card">
      <div class="section-hdr section-hdr-red">Exterior Rates</div>
      <table class="rate-table" id="ext-rates"></table>
    </div>
    <div class="card">
      <div class="section-hdr section-hdr-red">Interior Rates</div>
      <table class="rate-table" id="int-rates"></table>
    </div>
  </div>

</div>

<script>
const SEED='/stmc_ops/app/seed-data/';
const LOGIN_URL='{% url "login" %}';

// Redirect immediately if no session
if(!localStorage.getItem('stmc_user')){window.location.href=LOGIN_URL;}

function fmt(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}

function _initials(n){return(n||'').split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'}

function initAuth(data){
  const userId=localStorage.getItem('stmc_user');
  const users=(data&&data.users)||[];
  const user=users.find(u=>u.id===userId)||{name:userId,initials:_initials(userId)};
  const nameEl=document.getElementById('hN');
  const badgeEl=document.getElementById('hA');
  if(nameEl)nameEl.textContent=user.name||userId;
  if(badgeEl)badgeEl.textContent=user.initials||_initials(user.name||userId);
  document.querySelectorAll('.logout-link').forEach(btn=>{
    btn.addEventListener('click',()=>{
      localStorage.removeItem('stmc_user');
      localStorage.removeItem('stmc_region');
      window.location.href=LOGIN_URL;
    });
  });
}
function fmtDec(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtSf(n){return Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})+' SF'}

// Track active nav link for highlight
let activeNavLink=null;

function switchTab(link,tab){
  document.querySelectorAll('.tab-panel').forEach(p=>{p.style.display='none'});
  document.querySelectorAll('.app-nav-link').forEach(l=>{l.classList.remove('active')});
  document.getElementById('tab-'+tab).style.display='';
  if(link){link.classList.add('active');}
  // Update header title
  const titles={'projects':'My Projects','models':'Models','rates':'Rate Card'};
  document.querySelector('.header-title').textContent=titles[tab]||'Sales';
}

function phasePill(ph){
  const map={'framing':'brand','roofing':'brand','siding':'brand','interior':'warning','paint':'warning','punch':'success','complete':'success'};
  const t=map[(ph||'').toLowerCase()]||'muted';
  return`<span class="pill pill-${t}">${ph}</span>`;
}

function toggleProj(hdr){
  const body=hdr.nextElementSibling;
  const chev=hdr.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function phR(d){
  const ic=d.s==='p'?'\u2713':d.s==='c'?'\u25BA':(d.n===0?'D':d.n);
  const dc=d.s==='p'?'pdg':d.s==='c'?'pdb':'pdx';
  const sc=d.s==='p'?'var(--green)':d.s==='c'?'#1D4ED8':'var(--g400)';
  const sl=d.s==='p'?'Paid'+(d.t?' '+d.t:''):d.s==='c'?'Current':'Pending';
  return`<div class="ph">
    <div class="pd ${dc}">${ic}</div>
    <div style="flex:1"><div style="font-weight:500">${d.l}</div>${d.t&&d.s==='p'?`<div style="font-size:10px;color:var(--g400)">${d.t}</div>`:''}</div>
    <div style="text-align:right;min-width:55px">
      <div style="font-family:var(--font-mono);font-weight:500">${fmt(d.a)}</div>
      <div style="font-size:9px;font-weight:600;text-transform:uppercase;color:${sc}">${sl}</div>
    </div>
  </div>`;
}

function renderProjects(projects){
  const el=document.getElementById('projects-list');
  if(!projects||!projects.length){el.innerHTML='<div class="banner banner-empty">No projects yet.</div>';return}
  const totalContract=projects.reduce((a,p)=>a+p.ct,0);
  document.getElementById('sales-total').textContent=fmt(totalContract);

  // KPIs
  document.getElementById('sales-kpis').innerHTML=[
    {label:'Active builds',value:String(projects.length)},
  ].map(k=>`<div class="kpi-tile"><div class="kpi-val">${k.value}</div><div class="kpi-lbl">${k.label}</div></div>`).join('');

  el.innerHTML=projects.map(p=>{
    const collected=p.dr?p.dr.filter(d=>d.s==='p').reduce((a,d)=>a+d.a,0):0;
    const totalBg=Object.values(p.bg||{}).reduce((a,b)=>a+b,0);
    const totalAc=Object.values(p.ac||{}).reduce((a,b)=>a+b,0);
    const pct=totalBg>0?Math.min(100,Math.round(totalAc/totalBg*100)):0;
    const rem=totalBg-totalAc;
    const draws=(p.dr||[]).map(d=>phR(d)).join('');
    return`
    <div class="proj-card">
      <div class="proj-hdr" onclick="toggleProj(this)">
        <div class="proj-hdr-top">
          <div>
            <p class="proj-name">${p.nm}</p>
            <p class="proj-sub">${p.md} &middot; ${p.cu} &middot; PM: ${p.pm}</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${phasePill(p.ph)}
            <span class="chevron">&#8964;</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid var(--g200)">
          <div><div style="font-size:9px;color:var(--g400);text-transform:uppercase">Contract</div><div style="font-family:var(--font-mono);font-size:12px;font-weight:500;margin-top:1px">${fmt(p.ct)}</div></div>
          <div><div style="font-size:9px;color:var(--g400);text-transform:uppercase">Collected</div><div style="font-family:var(--font-mono);font-size:12px;font-weight:500;margin-top:1px;color:var(--green)">${fmt(collected)}</div></div>
          <div><div style="font-size:9px;color:var(--g400);text-transform:uppercase">Budget</div><div style="font-family:var(--font-mono);font-size:12px;font-weight:500;margin-top:1px">${pct}%</div></div>
          <div><div style="font-size:9px;color:var(--g400);text-transform:uppercase">Remaining</div><div style="font-family:var(--font-mono);font-size:12px;font-weight:500;margin-top:1px;color:var(--green)">${fmt(rem)}</div></div>
        </div>
      </div>
      <div class="proj-body">${draws}</div>
    </div>`;
  }).join('');
}

function renderModels(models){
  const el=document.getElementById('models-list');
  if(!models||!models.length){el.innerHTML='<div class="banner banner-empty">No models available.</div>';return}
  const sorted=[...models].sort((a,b)=>a.livingSf-b.livingSf);
  const hdr=`<div class="stl">Models <span class="stl-badge">${sorted.length}</span></div><div style="font-size:11px;color:var(--g500);margin-bottom:10px">Summertown / Hayden</div>`;
  const rows=sorted.map(m=>{
    const total=(m.materialTotal||0)+(m.laborBudget||0)+(m.concreteBudget||0);
    const perSf=m.livingSf>0?Math.round(total/m.livingSf):0;
    return`<div class="card" style="padding:10px 14px;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--g900)">${m.name}</div>
          ${m.livingSf?`<div style="font-size:10px;color:var(--g500)">${Number(m.livingSf).toLocaleString()} SF</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--g900)">${fmt(total)}</div>
          <div style="font-size:9px;color:var(--g500)">$${perSf}/SF</div>
        </div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=hdr+rows;
}

function renderRates(rc){
  const extEl=document.getElementById('ext-rates');
  const intEl=document.getElementById('int-rates');

  function buildTable(el,rows){
    if(!rows||!rows.length){el.innerHTML='<tr><td class="banner banner-empty" colspan="3">No rate data.</td></tr>';return}
    let lastGroup='';
    el.innerHTML='<thead><tr><th>Description</th><th class="r">Rate</th><th class="r">Unit</th></tr></thead><tbody>'
      +rows.map(r=>{
        let hdr='';
        if(r.g&&r.g!==lastGroup){lastGroup=r.g;hdr=`<tr class="rate-group-hdr"><td colspan="3">${r.g}</td></tr>`}
        const rateStr=r.r?'$'+Number(r.r).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
        return`${hdr}<tr><td>${r.l}</td><td class="r">${rateStr}</td><td class="u">${r.u||'—'}</td></tr>`;
      }).join('')+'</tbody>';
  }

  buildTable(extEl,(rc&&rc.exterior)||[]);
  buildTable(intEl,(rc&&rc.interior)||[]);
}

async function init(){
  try{
    const res=await fetch(SEED);
    const data=await res.json();
    initAuth(data);
    const sales=data.sales||{};
    renderProjects(sales.projects||[]);
    renderModels(sales.models||[]);
    renderRates(sales.rateCard||{});
    // Handle ?tab= deep-link from _nav.html
    const tab=new URLSearchParams(window.location.search).get('tab');
    if(tab){
      const link=document.querySelector(`.app-nav-link[data-mv-tab="${tab}"]`);
      switchTab(link,tab);
    }
  }catch(e){
    document.getElementById('projects-list').innerHTML='<div class="banner banner-empty">Failed to load data.</div>';
    console.error(e);
  }
}
init();
</script>
</body>
</html>
