<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Overview &mdash; STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'sales.css' %}">
</head>
<body>

<!-- Nav (shared with shell/turnkey wizard) -->
{% include "sales/_nav.html" %}

<!-- Header -->
<div class="header">
  <div class="header-sub">Sales</div>
  <div class="header-title">My Projects</div>
  <div class="header-total" id="sales-total">{{ sales_total }}</div>
  <div class="header-subtotal-note">Total Contract Value</div>
</div>

<!-- KPI strip -->
<div class="kpi-strip" id="sales-kpis">
  {% for kpi in kpis %}
    <div class="kpi-tile">
      <div class="{{ kpi.value_class }}">{{ kpi.value }}</div>
      <div class="kpi-lbl">{{ kpi.label }}</div>
    </div>
  {% endfor %}
</div>

<!-- Tab panels -->
<div class="container">

  <!-- My Projects -->
  <div id="tab-projects" class="tab-panel">
    <div
      id="tab-projects-panel"
      hx-get="{% url 'sales_projects_panel' %}"
      hx-trigger="load, sales-projects-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading projects...</div>
    </div>
  </div>

  <!-- Models -->
  <div id="tab-models" class="tab-panel" style="display:none">
    <div
      id="tab-models-panel"
      hx-get="{% url 'sales_models_panel' %}"
      hx-trigger="load, sales-models-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading models...</div>
    </div>
  </div>

  <!-- Rate Card -->
  <div id="tab-rates" class="tab-panel" style="display:none">
    <div
      id="tab-rates-panel"
      hx-get="{% url 'sales_rates_panel' %}"
      hx-trigger="load, sales-rates-refresh from:body, sales-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading rate card...</div>
    </div>
  </div>

</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'sales.js' %}"></script>
</body>
</html>
