{% comment %}Turnkey – Step 6: P10 Materials & Upgrades{% endcomment %}
<div class="wiz-step" id="tk-step-6" style="display:none">

  <div class="wiz-card">
    <div class="wiz-sec-hdr">P10 Material Order</div>
    <div class="wiz-card-pad">
      <div class="wiz-field">
        <label class="wiz-field-lbl">P10 Order Total</label>
        <input class="wiz-inp mono num" type="number" id="tk-p10" min="0" placeholder="0" />
      </div>
      <p style="font-size:11px;color:var(--g500);margin-top:6px;">This is the total of the Summertown Metals material package for this model. It is added directly to the contract as a pass-through line.</p>
    </div>
  </div>

  <div class="wiz-card">
    <div class="wiz-sec-hdr">
      Customer Upgrades
      <span class="badge" id="tk-upgrades-total">$0</span>
    </div>
    <div class="wiz-sec-body" id="tk-upgrades-body">
      <div class="wiz-banner wiz-banner-empty">No upgrades added yet.</div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--g200);">
      <button class="btn btn-secondary" id="tk-add-upgrade" type="button" style="width:100%">+ Add Upgrade</button>
    </div>
  </div>

  <!-- Upgrade entry form -->
  <div class="wiz-card" id="tk-upgrade-form" style="display:none">
    <div class="wiz-sec-hdr-dark">New Upgrade</div>
    <div class="wiz-card-pad">
      <div class="wiz-field" style="margin-bottom:10px">
        <label class="wiz-field-lbl">Description</label>
        <input class="wiz-inp" type="text" id="tk-upg-desc" placeholder="Upgrade description" />
      </div>
      <div class="wiz-field" style="margin-bottom:12px">
        <label class="wiz-field-lbl">Amount</label>
        <input class="wiz-inp mono num" type="number" id="tk-upg-amount" placeholder="0" min="0" />
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" id="tk-upg-save" type="button" style="flex:1">Add</button>
        <button class="btn btn-secondary" id="tk-upg-cancel" type="button" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>

</div>
