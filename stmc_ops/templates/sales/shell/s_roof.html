{% comment %}Shell – Step 2: Roof & Exterior Labor{% endcomment %}
<div class="wiz-step" id="sh-step-2" style="display:none">

  <div class="wiz-card">
    <div class="wiz-sec-hdr">
      Roof &amp; Exterior Labor
      <span class="badge" id="sh-ext-cust-price">—</span>
    </div>
    <div class="wiz-sec-body" id="sh-ext-lines-body">
      <!-- populated by shell.js -->
    </div>

    <div class="wiz-kpi-bar">
      <div class="wiz-kpi-cell">
        <div class="wiz-kpi-cell-lbl">Customer Price</div>
        <div class="wiz-kpi-cell-val" id="sh-ext-kpi-customer">—</div>
      </div>
      <div class="wiz-kpi-cell">
        <div class="wiz-kpi-cell-lbl">True Cost</div>
        <div class="wiz-kpi-cell-val" id="sh-ext-kpi-truecost">—</div>
      </div>
      <div class="wiz-kpi-cell">
        <div class="wiz-kpi-cell-lbl">Margin</div>
        <div class="wiz-kpi-cell-val" id="sh-ext-kpi-margin">—</div>
      </div>
    </div>

  </div>

  <!-- Breakdown detail -->
  <div class="wiz-card">
    <div class="wiz-sec-hdr-dark">Cost Detail</div>
    <div class="wiz-sec-body">
      <div class="upg-row">
        <span class="upg-label">Customer slab price<span class="upg-sub" id="sh-ext-cust-slab-detail">— SF × $12</span></span>
        <span class="upg-cost" id="sh-ext-cust-total">—</span>
      </div>
      <div class="upg-row">
        <span class="upg-label">True exterior labor cost</span>
        <span class="upg-cost" id="sh-ext-true-cost">—</span>
      </div>
    </div>
  </div>

</div>
