{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>STMC Contracts BuildWizard - Shell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}" />
  <style>
    .logout-link {
      border: none;
      background: transparent;
      color: #fca5a5;
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
    }
    .app-nav {
      position: sticky;
      top: 0;
      z-index: 119;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      overflow-x: auto;
    }
    .app-nav-link {
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .app-nav-link.active {
      color: #a31a1a;
      border-color: #fecaca;
      background: #fef2f2;
    }
  </style>
</head>
<body>

{% include "sales/_nav.html" %}

<div class="header">
  <div class="header-sub">Summertown Metals Contracting</div>
  <div class="header-title">STMC Contracts BuildWizard</div>
  <div class="header-total" id="hdrTotal">$0</div>
  <div class="header-subtotal-note" id="hdrSub">Total Exterior Shell Package</div>
  <div class="header-split" id="hdrSplit" style="display:none"></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container" id="stepContainer"></div>

<div class="nav-wrap">
  <div class="nav">
    <button class="nav-btn nav-prev" id="navPrev" onclick="wizPrev()">&larr; Previous</button>
    <div class="nav-status" id="navStatus"></div>
    <button class="nav-btn nav-next" id="navNext" onclick="wizNext()">Next &rarr;</button>
  </div>
</div>

<div class="footer">
  <span class="footer-left">
    <button class="footer-btn" onclick="exportStateJSON()">Export</button>
    <button class="footer-btn" onclick="importStateJSON()">Import</button>
    <button class="footer-btn footer-btn-danger" onclick="resetAll()">Reset</button>
  </span>
  <span class="footer-right" id="footerSaveStatus">Ready</span>
</div>

<div class="toast" id="toast"></div>
<div id="printSheet" style="display:none"></div>

{{ wizard_seed_data|json_script:"stmc-wizard-seed-data" }}
<script>
  window.STMC_WIZARD_DATA = JSON.parse(document.getElementById("stmc-wizard-seed-data").textContent);
  window.STMC_WIZARD_DEFAULT_MODE = "{{ wizard_mode }}";
  window.LOGIN_URL = "{% url 'login' %}";
  window.LOGOUT_URL = "{% url 'logout' %}";
  window.CSRF_TOKEN = "{{ csrf_token }}";
  window.STMC_USER = {
    name: "{{ user.name|default:user.email|escapejs }}",
    initials: "{{ user.initials|default:''|escapejs }}",
    role: "{{ user.role|escapejs }}"
  };
</script>
<script src="{% static 'contracts/buildwizard.js' %}" defer></script>
<script>
  (function initSalesNavbar() {
    function initials(value) {
      if (!value) return "SL";
      var parts = String(value).trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "SL";
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    document.addEventListener("DOMContentLoaded", function () {
      var user = window.STMC_USER || {};
      var displayName = user.name || "Sales";
      var displayInitials = user.initials || initials(displayName);

      var nameEl = document.getElementById("appUserName");
      var badgeEl = document.getElementById("appUserBadge");
      var navNameEl = document.getElementById("hN");
      var navBadgeEl = document.getElementById("hA");
      if (nameEl) nameEl.textContent = displayName;
      if (badgeEl) badgeEl.textContent = displayInitials;
      if (navNameEl) navNameEl.textContent = displayName;
      if (navBadgeEl) navBadgeEl.textContent = displayInitials;

      document.querySelectorAll(".logout-link").forEach(function (button) {
        button.addEventListener("click", function () {
          fetch(window.LOGOUT_URL, {
            method: "POST",
            credentials: "same-origin",
            headers: { "X-CSRFToken": window.CSRF_TOKEN }
          }).finally(function () { window.location.href = window.LOGIN_URL; });
        });
      });
    });
  })();
</script>
</body>
</html>
