{% comment %}Sales wizard – Step 2: Exterior Labor{% endcomment %}
<div class="wizard-step" id="step-exterior" style="display:none">

  <div class="stl">Exterior labor</div>

  <div class="sh">Customer pricing
    <span id="ext-cust-price">—</span>
  </div>
  <div class="sb">
    <div class="rw">
      <span class="rl">Base shell</span>
      <span class="rd" id="ext-cust-slab-detail">— SF × $12</span>
      <span class="rv" id="ext-cust-total">—</span>
    </div>
    <div class="rw rt">
      <span class="rl">Customer total</span>
      <span class="rv" style="color:var(--brand)" id="ext-cust-price-total">—</span>
    </div>
  </div>

  <div class="shd">Contractor budget
    <span id="ext-true-cost">—</span>
  </div>
  <div class="sb" id="ext-lines-body">
    <!-- populated by sales.js -->
  </div>

  <div class="kpis cols-3">
    <article class="kpi">
      <div class="kpi-label">Customer</div>
      <div class="kpi-value mono" id="ext-kpi-customer" style="font-size:15px">—</div>
    </article>
    <article class="kpi">
      <div class="kpi-label">True cost</div>
      <div class="kpi-value mono" id="ext-kpi-truecost" style="font-size:15px">—</div>
    </article>
    <article class="kpi">
      <div class="kpi-label">Margin</div>
      <div class="kpi-value mono" id="ext-kpi-margin" style="font-size:15px">—</div>
    </article>
  </div>

</div>
