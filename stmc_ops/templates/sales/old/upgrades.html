{% comment %}Sales wizard – Step 5: P10 & Upgrades{% endcomment %}
<div class="wizard-step" id="step-upgrades" style="display:none">

  <div class="stl">P10 and upgrades</div>

  <article class="card">
    <div class="field">
      <label for="sw-p10">P10 order total</label>
      <input id="sw-p10" type="number" min="0" placeholder="0" />
    </div>
  </article>

  <div class="sh">Customer upgrades
    <span id="upgrades-total">$0</span>
  </div>

  <div class="sb" id="upgrades-body">
    <div style="color:var(--text-soft);font-size:12px;text-align:center;padding:12px">
      No upgrades added
    </div>
  </div>

  <div class="wizard-actions">
    <button id="sw-add-upgrade" class="btn btn-secondary" type="button">+ Add upgrade</button>
  </div>

</div>
