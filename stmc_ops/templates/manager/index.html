<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>STMC Operations – Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'styles.css' %}" />
</head>
<body data-page="manager" class="page-shell">

  <header class="header">
    <div class="header-left">
      <strong>SUMMERTOWN METALS</strong>
      <span class="header-muted" id="hR"></span>
    </div>
    <div class="header-right">
      <span id="hN" class="header-muted"></span>
      <span id="hA" class="header-badge"></span>
      <span class="logout-link" role="button" tabindex="0">Logout</span>
    </div>
  </header>

  <nav class="nav">
    <button class="active" data-target="mgr-builds">My builds</button>
    <button data-target="mgr-budgets">Budgets</button>
    <button data-target="mgr-draws">Draws</button>
  </nav>

  <main class="wrap">

    <section id="mgr-builds" class="page active">
      {% include "manager/my_builds.html" %}
    </section>

    <section id="mgr-budgets" class="page">
      {% include "manager/budgets.html" %}
    </section>

    <section id="mgr-draws" class="page">
      {% include "manager/draws.html" %}
    </section>

  </main>

  <script>
    window.STMC_ROUTES = {
      login: "{% url 'login' %}",
      sales: "{% url 'sales' %}",
      pm:    "{% url 'manager' %}",
      exec:  "{% url 'owner' %}"
    };
    window.STMC_DATA_URL = "{% static 'data.json' %}";
  </script>
  <script src="{% static 'script.js' %}"  defer></script>
  <script src="{% static 'manager.js' %}" defer></script>
</body>
</html>
