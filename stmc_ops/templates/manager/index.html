<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PM Dashboard — STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'manager.css' %}?v=4">
</head>
<body>

<!-- Nav -->
<nav class="app-nav">
  <div class="app-nav-left">
    <button class="app-nav-link active" data-tab="builds-active" type="button">Active Builds</button>
    <button class="app-nav-link" data-tab="builds-closed" type="button">Closed Builds</button>
    <button class="app-nav-link" data-tab="draws" type="button">Draws</button>
  </div>
  <div class="app-nav-right">
    <span id="hN" style="font-size:11px;color:#4b5563"></span>
    <span id="hA" style="width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:#111827;color:#fff;font-size:10px;font-weight:700"></span>
    <button class="logout-link" type="button">Logout</button>
  </div>
</nav>

<!-- Header -->
<div class="header" id="pm-header">
  <div class="header-sub">Project Manager</div>
  <div class="header-title">PM Dashboard</div>
</div>

<!-- KPI strip -->
<div class="kpi-strip" id="pm-kpis">
  {% for kpi in kpis %}
    <div class="kpi-tile">
      <div class="{{ kpi.value_class }}">{{ kpi.value }}</div>
      <div class="kpi-lbl">{{ kpi.label }}</div>
    </div>
  {% endfor %}
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Shared modal host for manager HTMX overlays (change order + mark complete). -->
<div id="manager-modal-host"></div>

<!-- Tab panels -->
<div class="container">

  <div id="job-search-wrap" class="job-search-wrap">
    <div class="job-search-controls">
      <label class="job-search-field">
        <span class="job-search-chip">Search</span>
        <input
          id="job-search-input"
          class="job-search-input"
          type="search"
          placeholder="customer, order #, branch"
          aria-label="Search jobs"
        >
      </label>
      <button id="job-search-btn" class="job-search-btn" type="button">Find Job</button>
    </div>
    <div class="job-filter-row" aria-label="Build filters">
      <select id="job-filter-branch" class="job-filter-select" aria-label="Filter by branch">
        <option value="">All branches</option>
      </select>
      <select id="job-filter-plan" class="job-filter-select" aria-label="Filter by plan">
        <option value="">All plans</option>
      </select>
      <select id="job-filter-phase" class="job-filter-select" aria-label="Filter by phase">
        <option value="">All phases</option>
      </select>
      <select id="job-filter-year" class="job-filter-select" aria-label="Filter by year">
        <option value="">All years</option>
      </select>
      <select id="job-filter-sort" class="job-filter-select" aria-label="Sort jobs">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
  </div>

  <div class="job-view-toggle" role="group" aria-label="View mode">
    <button id="job-view-table" type="button" class="job-view-btn" aria-pressed="true">Table</button>
    <button id="job-view-cards" type="button" class="job-view-btn active" aria-pressed="false">Cards</button>
  </div>

  <!-- Active Builds -->
  <div id="tab-builds-active" class="tab-panel">
    <div
      id="tab-builds-active-panel"
      hx-get="{% url 'manager_builds_active_panel' %}"
      hx-trigger="load, manager-builds-active-refresh from:body, manager-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading active builds...</div>
    </div>
  </div>

  <!-- Closed Builds -->
  <div id="tab-builds-closed" class="tab-panel" style="display:none">
    <div
      id="tab-builds-closed-panel"
      hx-get="{% url 'manager_builds_closed_panel' %}"
      hx-trigger="load, manager-builds-closed-refresh from:body, manager-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading closed builds...</div>
    </div>
  </div>

  <!-- Draws -->
  <div id="tab-draws" class="tab-panel" style="display:none">
    <div
      id="tab-draws-panel"
      hx-get="{% url 'manager_draws_panel' %}"
      hx-trigger="load, manager-draws-refresh from:body, manager-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading draws...</div>
    </div>
  </div>

</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'manager.js' %}?v=3"></script>
</body>
</html>
