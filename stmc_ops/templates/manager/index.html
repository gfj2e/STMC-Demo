<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PM Dashboard — STMC</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'contracts/buildwizard.css' %}">
<link rel="stylesheet" href="{% static 'manager.css' %}">
</head>
<body>

<!-- Nav -->
<nav class="app-nav">
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1">
    <button class="app-nav-link active" data-tab="builds" type="button">My Builds</button>
    <button class="app-nav-link" data-tab="budgets" type="button">Budgets</button>
    <button class="app-nav-link" data-tab="draws" type="button">Draws</button>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;white-space:nowrap">
    <button class="logout-link" type="button">Logout</button>
    <span id="hN" style="font-size:11px;color:#4b5563"></span>
    <span id="hA" style="width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:#111827;color:#fff;font-size:10px;font-weight:700"></span>
  </div>
</nav>

<!-- Header -->
<div class="header" id="pm-header">
  <div class="header-sub">Project Manager</div>
  <div class="header-title">PM Dashboard</div>
</div>

<!-- KPI strip -->
<div class="kpi-strip" id="pm-kpis">
  {% for kpi in kpis %}
    <div class="kpi-tile">
      <div class="{{ kpi.value_class }}">{{ kpi.value }}</div>
      <div class="kpi-lbl">{{ kpi.label }}</div>
    </div>
  {% endfor %}
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Tab panels -->
<div class="container">

  <!-- My Builds -->
  <div id="tab-builds" class="tab-panel">
    <div
      id="tab-builds-panel"
      hx-get="{% url 'manager_builds_panel' %}"
      hx-trigger="load, manager-builds-refresh from:body, manager-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading builds...</div>
    </div>
  </div>

  <!-- Budgets -->
  <div id="tab-budgets" class="tab-panel" style="display:none">
    <div
      id="tab-budgets-panel"
      hx-get="{% url 'manager_budgets_panel' %}"
      hx-trigger="load, manager-budgets-refresh from:body, manager-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading budgets...</div>
    </div>
  </div>

  <!-- Draws -->
  <div id="tab-draws" class="tab-panel" style="display:none">
    <div
      id="tab-draws-panel"
      hx-get="{% url 'manager_draws_panel' %}"
      hx-trigger="load, manager-draws-refresh from:body, manager-refresh from:body"
      hx-swap="innerHTML"
    >
      <div class="banner banner-empty">Loading draws...</div>
    </div>
  </div>

</div>

<script>
  window.LOGIN_URL = '{% url "login" %}';
  window.LOGOUT_URL = '{% url "logout" %}';
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.STMC_USER = {
    name: '{{ user.name|default:user.email|escapejs }}',
    initials: '{{ user.initials|default:""|escapejs }}',
    role: '{{ user.role|escapejs }}'
  };
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="{% static 'manager.js' %}"></script>
</body>
</html>
